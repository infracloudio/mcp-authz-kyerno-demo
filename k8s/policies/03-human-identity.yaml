# ──────────────────────────────────────────────────────────────────────────────
# Policy 3a: Human Identity Injection
# API: kyverno.io/v1 / ClusterPolicy (JMESPath — battle-tested, no CEL type issues)
#
# Injects 5 audit annotations onto every MCPToolInvocation at admission time.
# Annotations are written by Kyverno — not by the agent or the proxy.
# Even if the CR is later deleted, the Kubernetes audit log retains the record.
#
# Annotations injected:
#   mcp.security.io/triggered-by  → spec.triggeredBy (human email) or SA username
#   mcp.security.io/triggered-at  → admission timestamp via time_now_utc()
#   mcp.security.io/agent-id      → spec.agentId or SA username
#   mcp.security.io/tenant-id     → spec.tenantId or namespace
#   mcp.security.io/policy-version → "v1"
# ──────────────────────────────────────────────────────────────────────────────
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: mcp-inject-human-identity
  annotations:
    policies.kyverno.io/title: MCP Human Identity Injection
    policies.kyverno.io/category: MCP Authorization
    policies.kyverno.io/severity: medium
    policies.kyverno.io/description: >-
      Mutates incoming MCPToolInvocations to inject tamper-proof audit annotations.
      triggered-by falls back to the calling SA if no human identity is provided.
      triggered-at is set by Kyverno at admission time — not by the agent.
spec:
  background: false
  rules:
  - name: inject-audit-annotations
    match:
      any:
      - resources:
          kinds:
          - MCPToolInvocation
    mutate:
      patchStrategicMerge:
        metadata:
          annotations:
            # Human identity — falls back to SA username if triggeredBy is absent
            +(mcp.security.io/triggered-by): >-
              {{request.object.spec.triggeredBy || request.userInfo.username}}
            # Admission timestamp — set by Kyverno, cannot be forged by the agent
            +(mcp.security.io/triggered-at): "{{time_now_utc()}}"
            # Agent identity — falls back to SA username if agentId is absent
            +(mcp.security.io/agent-id): >-
              {{request.object.spec.agentId || request.userInfo.username}}
            # Tenant context — falls back to namespace if tenantId is absent
            +(mcp.security.io/tenant-id): >-
              {{request.object.spec.tenantId || request.object.metadata.namespace}}
            # Policy version — for future policy migration tracking
            +(mcp.security.io/policy-version): "v1"

---
# ──────────────────────────────────────────────────────────────────────────────
# Policy 3b: Require Human Trigger for Write Tools
# API: policies.kyverno.io/v1 / ValidatingPolicy (CEL)
#
# Write-capable tools must carry a non-empty triggeredBy field.
# An autonomous agent calling pods_delete or resources_scale with no human
# context is denied at admission time — the tool call never reaches the MCP server.
#
# Write tools: pods_delete, pods_exec, pods_run,
#              resources_scale, resources_create_or_update, resources_delete
# ──────────────────────────────────────────────────────────────────────────────
apiVersion: policies.kyverno.io/v1
kind: ValidatingPolicy
metadata:
  name: mcp-require-human-trigger
  annotations:
    policies.kyverno.io/title: MCP Require Human Trigger for Write Tools
    policies.kyverno.io/category: MCP Authorization
    policies.kyverno.io/severity: high
    policies.kyverno.io/description: >-
      Write-capable MCP tools must carry a human triggeredBy field.
      Automated invocations without explicit human context are denied.
spec:
  validationActions:
    - Deny
  matchConstraints:
    resourceRules:
      - apiGroups:   ["mcp.security.io"]
        apiVersions: ["v1alpha1"]
        operations:  ["CREATE"]
        resources:   ["mcptoolinvocations"]
  validations:
    - expression: >-
        !(object.spec.toolName in [
          "pods_delete",
          "pods_exec",
          "pods_run",
          "resources_scale",
          "resources_create_or_update",
          "resources_delete"
        ]) ||
        (has(object.spec.triggeredBy) && object.spec.triggeredBy != "")
      messageExpression: >-
        "Write-capable tool '" + object.spec.toolName +
        "' requires a human triggeredBy field. " +
        "Automated invocations without explicit human context are denied."